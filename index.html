<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>AI 简历匹配器</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <header class="topbar">
      <div>
        <h1>AI 简历匹配器</h1>
      </div>
      <div class="status-pill">本地 AI + PDF/OCR</div>
    </header>

    <main class="app-shell">
      <section class="workspace">
        <div class="panel input-panel">
          <div class="panel-header">
            <div>
              <h2>简历</h2>
              <p>粘贴你想评估的简历或个人介绍。</p>
            </div>
            <div class="button-row">
              <label class="file-button" for="resumePdfInput">上传 PDF</label>
              <input id="resumePdfInput" class="file-input" type="file" accept="application/pdf">
              <button class="ghost-button" id="loadSample" type="button">载入示例</button>
            </div>
          </div>
          <textarea id="resumeInput" spellcheck="true" placeholder="在这里粘贴简历文本..."></textarea>
        </div>

        <div class="panel input-panel">
          <div class="panel-header">
            <div>
              <h2>岗位描述</h2>
              <p>粘贴目标岗位的职责和要求。</p>
            </div>
            <div class="button-row">
              <label class="file-button" for="jobImageInput">上传图片</label>
              <input id="jobImageInput" class="file-input" type="file" accept="image/png,image/jpeg,image/webp">
              <button class="primary-button" id="analyzeButton" type="button">分析匹配度</button>
            </div>
          </div>
          <textarea id="jobInput" spellcheck="true" placeholder="在这里粘贴岗位描述..."></textarea>
        </div>
      </section>

      <section class="results-grid" aria-live="polite">
        <article class="score-card">
          <div>
            <p class="eyebrow">匹配分数</p>
            <strong id="scoreValue">--</strong>
          </div>
          <div class="score-ring" id="scoreRing" aria-hidden="true"></div>
          <p id="scoreSummary">粘贴两段文本后运行分析。</p>
        </article>

        <article class="panel">
          <h2>能力覆盖</h2>
          <div class="meter-row">
            <span>硬技能</span>
            <div class="meter"><span id="hardMeter"></span></div>
            <b id="hardValue">0%</b>
          </div>
          <div class="meter-row">
            <span>软技能</span>
            <div class="meter"><span id="softMeter"></span></div>
            <b id="softValue">0%</b>
          </div>
          <div class="meter-row">
            <span>岗位信号</span>
            <div class="meter"><span id="roleMeter"></span></div>
            <b id="roleValue">0%</b>
          </div>
        </article>

        <article class="panel ai-panel">
          <h2>AI 语义匹配</h2>
          <div class="ai-score-row">
            <strong id="semanticValue">--</strong>
            <span id="semanticStatus">点击分析后加载免费本地 AI 模型。</span>
          </div>
          <p id="semanticSummary">AI 模型会在浏览器中比较简历和岗位描述的语义接近度。</p>
        </article>

        <article class="panel list-panel">
          <h2>匹配优势</h2>
          <ul id="strengthList"></ul>
        </article>

        <article class="panel list-panel">
          <h2>优先补齐项</h2>
          <ul id="gapList"></ul>
        </article>

        <article class="panel suggestions">
          <div class="panel-header compact">
            <h2>改写建议</h2>
            <div class="button-row">
              <button class="ghost-button" id="copyReport" type="button">复制</button>
              <button class="ghost-button" id="downloadReport" type="button">下载</button>
            </div>
          </div>
          <ol id="suggestionList"></ol>
        </article>

        <article class="panel greeting-panel">
          <div class="panel-header compact">
            <h2>打招呼语</h2>
            <button class="ghost-button" id="copyGreeting" type="button">复制</button>
          </div>
          <p id="greetingText">完成分析后会生成一段适合投递或私信招聘方的开场白。</p>
        </article>
      </section>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <script src="script.js"></script>
  </body>
</html>
